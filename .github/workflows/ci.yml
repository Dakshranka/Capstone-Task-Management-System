name: Full Stack CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-docker:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: taskdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: capstone-project-frontend/package-lock.json

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw
        working-directory: capstone-project-backend

      - name: Build backend (mvn clean verify)
        run: ./mvnw clean verify
        working-directory: capstone-project-backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/taskdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          APP_JWT_SECRET: ThisIsADevOnlySuperSecretJwtKeyThatIsLongEnough123456
          APP_JWT_EXPIRATION_MS: 86400000

      - name: Build frontend (npm ci + npm run build)
        run: |
          npm ci
          npm run build
        working-directory: capstone-project-frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract backend Docker metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/capstone-backend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push backend Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./capstone-project-backend
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

      - name: Extract frontend Docker metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/capstone-frontend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push frontend Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./capstone-project-frontend
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}

      - name: Build backend Docker image (PR validation)
        if: github.event_name == 'pull_request'
        run: docker build -t capstone-backend:ci ./capstone-project-backend

      - name: Build frontend Docker image (PR validation)
        if: github.event_name == 'pull_request'
        run: docker build -t capstone-frontend:ci ./capstone-project-frontend
